<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Dico Pro</title>
<style>
    :root { --bg:#f7f4ef; --surface:#ffffff; --accent:#b8860b; --text:#1a1712; }
    body.dark { --bg:#0f0e0c; --surface:#1a1916; --accent:#e8c57a; --text:#e8e0d0; }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
    .app { max-width: 600px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
    input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
    .word-card { background: var(--surface); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #ddd; }
    .list-select { margin-top: 10px; font-size: 12px; }
</style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1>Mon Dico</h1>
        <button onclick="window.location.href='flashcards.html'">Flashcards</button>
    </div>

    <div class="input-group">
        <input type="text" id="wordInput" placeholder="Entrer un mot...">
        <button onclick="addWord()">Ajouter</button>
    </div>

    <div id="wordList"></div>
</div>

<script>
    // Structure : { word, translation, list: "Général" }
    let words = JSON.parse(localStorage.getItem('words') || '[]');
    let lists = JSON.parse(localStorage.getItem('lists') || '["Général"]');

    async function addWord() {
        const input = document.getElementById('wordInput');
        const term = input.value.trim();
        if(!term) return;

        // Ici, appel API comme avant...
        const newWord = { id: Date.now(), term, translation: "...", list: "Général" };
        words.unshift(newWord);
        localStorage.setItem('words', JSON.stringify(words));
        render();
    }

    function render() {
        const container = document.getElementById('wordList');
        container.innerHTML = words.map(w => `
            <div class="word-card">
                <h3>${w.term}</h3>
                <p>${w.translation}</p>
                <select class="list-select" onchange="moveWord(${w.id}, this.value)">
                    ${lists.map(l => `<option value="${l}" ${w.list===l?'selected':''}>${l}</option>`).join('')}
                </select>
            </div>
        `).join('');
    }

    render();
</script>
</body>
</html>
