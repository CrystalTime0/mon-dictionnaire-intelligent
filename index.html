<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" id="themeColor" content="#f7f4ef">
    <title>Mon Dico Pro</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Mono&family=Lora:ital,wght@0,400;0,600&display=swap" rel="stylesheet">

    <style>
        :root{--bg:#f7f4ef;--surface:#ffffff;--border:#ddd8ce;--text:#1a1712;--muted:#9b9184;--accent:#b8860b;--accent2:#c0552a;--card:#f0ece4;--dim:#c8c2b8}
        body.dark{--bg:#0f0e0c;--surface:#1a1916;--border:#2e2b26;--text:#e8e0d0;--muted:#6b6558;--accent:#e8c57a;--accent2:#d4845a;--card:#222018;--dim:#3a3630}
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:'Fraunces',serif;padding:20px;transition:background .3s,color .3s}
        .container{max-width:600px;margin:0 auto}

        /* ── Header ── */
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:10px}
        .header-actions{display:flex;gap:8px;align-items:center}
        .header-btn{background:var(--surface);border:1px solid var(--border);padding:6px 10px;border-radius:8px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);transition:all .15s}
        .header-btn:hover{border-color:var(--accent);color:var(--accent)}

        /* ── Active filter breadcrumb ── */
        .active-filter{display:none;align-items:center;gap:8px;margin-bottom:14px;padding:7px 12px;background:rgba(184,134,11,.07);border:1px solid rgba(184,134,11,.2);border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
        body.dark .active-filter{background:rgba(232,197,122,.06);border-color:rgba(232,197,122,.15)}
        .active-filter.show{display:flex}
        .active-filter-name{color:var(--accent);font-weight:500}
        .active-filter-reset{background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;margin-left:auto;padding:0}
        .active-filter-reset:hover{color:var(--accent2)}

        /* ── Search / toolbar ── */
        .search-box{display:flex;gap:8px;background:var(--surface);padding:10px;border-radius:12px;border:1px solid var(--border);margin-bottom:20px}
        .search-box input{flex:1;background:transparent;border:none;color:var(--text);font-size:18px;outline:none}
        .search-box button{background:var(--accent);border:none;padding:8px 15px;border-radius:8px;cursor:pointer;font-weight:bold;color:white}
        .toolbar{display:flex;gap:8px;margin-bottom:16px}
        .io-btn{padding:6px 12px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.04em;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
        .io-btn:hover{border-color:var(--accent);color:var(--accent)}
        .io-btn.imp:hover{border-color:var(--accent2);color:var(--accent2)}

        /* ── Search + sort bar ── */
        .filter-row{display:flex;gap:8px;margin-bottom:16px;align-items:center}
        .filter-search{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 11px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);outline:none;min-width:0}
        .filter-search::placeholder{color:var(--muted)}
        .sort-btn{padding:6px 10px;font-family:'DM Mono',monospace;font-size:11px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
        .sort-btn.on{background:var(--card);color:var(--text);border-color:var(--dim)}
        .sort-btn:hover{border-color:var(--accent);color:var(--accent)}

        /* ── Audio button ── */
        .btn-audio{background:none;border:none;cursor:pointer;font-size:16px;padding:0 4px;opacity:.5;transition:opacity .15s;vertical-align:middle}
        .btn-audio:hover{opacity:1}
        .btn-audio.speaking{opacity:1;animation:pulse .6s ease infinite alternate}
        @keyframes pulse{from{transform:scale(1)}to{transform:scale(1.25)}}

        /* ── Stats overlay ── */
        .stats-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center;padding:0}
        .stats-overlay.open{display:flex}
        .stats-panel{background:var(--surface);border-radius:20px 20px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:24px 20px 32px}
        .stats-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
        .stats-title{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
        .stats-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}
        .stats-close:hover{color:var(--text)}
        .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
        .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
        .stat-val{font-family:'Fraunces',serif;font-size:32px;font-weight:600;color:var(--accent);line-height:1}
        .stat-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.06em;text-transform:uppercase}
        .stats-section-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
        .stats-list-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:12px}
        .stats-list-row:last-child{border-bottom:none}
        .stats-list-name{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .stats-list-count{color:var(--accent);font-weight:500}
        .stats-bar-wrap{flex:2;height:5px;background:var(--dim);border-radius:3px;overflow:hidden}
        .stats-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease}
        .stats-week{display:flex;gap:4px;align-items:flex-end;height:60px;margin-top:4px}
        .week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
        .week-bar{width:100%;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;transition:height .4s ease;opacity:.7}
        .week-bar.today{opacity:1}
        .week-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-align:center}

        /* ── Word cards ── */
        .word-card{background:var(--surface);border:1px solid var(--border);border-radius:15px;margin-bottom:15px;overflow:hidden}
        .word-header{padding:15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
        .word-title{font-size:22px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .word-list-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-weight:400}
        .word-content{padding:0 15px 15px;border-top:1px solid var(--border)}
        .translation{font-size:24px;color:var(--accent);font-style:italic;margin:15px 0;display:block}
        .pos-block{margin-bottom:20px}
        .pos-title{font-family:'Lora',serif;font-style:italic;color:var(--accent2);font-weight:600;font-size:16px;margin-bottom:10px;display:block}
        .definition-item{margin-bottom:15px;padding-left:5px}
        .def-text{display:flex;gap:10px;font-size:15px;line-height:1.5}
        .def-num{color:var(--muted);font-family:'DM Mono',monospace;font-size:13px;margin-top:2px}
        .example{color:var(--muted);font-size:14px;margin:5px 0 5px 22px;display:block}
        .btn-del{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:5px;cursor:pointer;font-size:11px;margin-top:15px}

        /* ── List assign row in word card ── */
        .word-list-row{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
        .word-list-row-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
        .word-list-select{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);cursor:pointer;outline:none;flex:1}
        .word-list-select option{background:var(--surface)}

        /* ── Sidebar ── */
        .sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
        .sb-overlay.open{opacity:1;pointer-events:auto}
        .sidebar{position:fixed;top:0;left:0;bottom:0;width:270px;background:var(--surface);border-right:1px solid var(--border);z-index:201;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
        .sidebar.open{transform:translateX(0)}
        .sb-head{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .sb-title{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
        .sb-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1;padding:2px 4px}
        .sb-close:hover{color:var(--text)}
        .sb-tree{flex:1;overflow-y:auto;padding:8px 0}

        /* Tree rows */
        .tree-all{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);transition:background .12s}
        .tree-all:hover{background:var(--card);color:var(--text)}
        .tree-all.active{color:var(--accent);background:var(--card)}
        .tree-divider{height:1px;background:var(--border);margin:6px 0}

        .tree-folder{margin-bottom:1px}
        .tree-folder-head{display:flex;align-items:center;gap:6px;padding:8px 16px;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);transition:background .12s;user-select:none}
        .tree-folder-head:hover{background:var(--card)}
        .tree-caret{font-size:9px;transition:transform .18s;flex-shrink:0;color:var(--muted)}
        .tree-folder.open .tree-caret{transform:rotate(90deg)}
        .tree-folder-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .tree-count{font-size:10px;color:var(--muted);margin-left:auto;flex-shrink:0}
        .tree-del{opacity:.35;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 2px;line-height:1;flex-shrink:0;transition:opacity .15s}
        .tree-del:hover{opacity:1;color:var(--accent2)}
        .tree-edit{opacity:.35;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0 2px;line-height:1;flex-shrink:0;transition:opacity .15s}
        .tree-edit:hover{opacity:1;color:var(--accent)}
        .tree-rename-input{flex:1;background:var(--card);border:1px solid var(--accent);border-radius:5px;padding:2px 6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);outline:none;min-width:0}
        .tree-children{padding-left:0;display:none;border-left:2px solid var(--border);margin-left:24px}
        .tree-folder.open .tree-children{display:block}

        .tree-item{display:flex;align-items:center;gap:6px;padding:7px 16px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);transition:background .12s}
        .tree-item:hover{background:var(--card);color:var(--text)}
        .tree-item.active{color:var(--accent);background:rgba(184,134,11,.06)}
        body.dark .tree-item.active{background:rgba(232,197,122,.06)}
        .tree-item-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

        /* Sidebar footer */
        .sb-footer{padding:12px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
        .sb-add-row{display:flex;gap:6px;align-items:center}
        .sb-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 9px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);outline:none;min-width:0}
        .sb-input::placeholder{color:var(--muted)}
        .sb-add-btn{padding:6px 10px;font-family:'DM Mono',monospace;font-size:11px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
        .sb-add-btn:hover{border-color:var(--accent);color:var(--accent)}
        .sb-parent-select{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);outline:none;cursor:pointer;max-width:90px}
        .sb-parent-select option{background:var(--surface)}

        /* ── Flashcard overlay ── */
        .flashcard-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}
        .flashcard-box{background:var(--surface);border-radius:20px;padding:30px 24px;max-width:500px;width:100%;text-align:center;border:1px solid var(--border)}
        .fc-wrap{display:flex;flex-direction:column;align-items:center;padding-top:4px}
        .fc-prog{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:20px;letter-spacing:.1em}
        .fc-prog em{color:var(--text);font-style:normal}
        .fc-scene{width:100%;max-width:460px;height:250px;perspective:1000px;cursor:pointer;margin-bottom:24px;-webkit-tap-highlight-color:transparent}
        .fc-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .52s cubic-bezier(.4,0,.2,1)}
        .fc-card.flipped{transform:rotateY(180deg)}
        .fc-face{position:absolute;inset:0;border-radius:14px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;backface-visibility:hidden;-webkit-backface-visibility:hidden;text-align:center;gap:8px}
        .fc-front{background:var(--surface)}
        .fc-back{background:var(--card);transform:rotateY(180deg)}
        .fc-hint{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
        .fc-word-front{font-family:'Fraunces',serif;font-size:clamp(26px,7vw,38px);font-weight:300;line-height:1.1;color:var(--text)}
        .fc-trad{font-family:'Lora',serif;font-size:clamp(20px,5vw,28px);font-style:italic;font-weight:600;color:var(--accent);line-height:1.2}
        .fc-def-sm{font-family:'DM Mono',monospace;font-size:11px;font-weight:300;color:var(--muted);line-height:1.6;max-width:300px;letter-spacing:.02em}
        .fc-nav{display:flex;gap:12px;align-items:center}
        .nav-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
        .nav-btn:disabled{opacity:.3}
        .nav-btn:active:not(:disabled){background:var(--card)}
        .flip-btn{padding:10px 24px;border-radius:20px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;-webkit-tap-highlight-color:transparent}
        .flip-btn:active{background:var(--accent);color:#fff}
        .fc-dots{display:flex;gap:6px;margin-top:18px;flex-wrap:wrap;justify-content:center;max-width:300px}
        .dot{width:7px;height:7px;border-radius:50%;background:var(--dim);cursor:pointer;-webkit-tap-highlight-color:transparent}
        .dot.cur{background:var(--accent)}
        .dot.seen{background:var(--muted)}
        .fc-close{margin-top:20px;background:none;border:1px solid var(--border);color:var(--muted);padding:6px 16px;border-radius:8px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.06em}
        .fc-close:hover{border-color:var(--accent2);color:var(--accent2)}
    </style>
</head>
<body>

<!-- Sidebar overlay + panel -->
<div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
    <div class="sb-head">
        <span class="sb-title">Mes listes</span>
        <button class="sb-close" onclick="closeSidebar()">×</button>
    </div>
    <div class="sb-tree" id="sbTree"></div>
    <div class="sb-footer">
        <!-- Add list -->
        <div class="sb-add-row">
            <input class="sb-input" id="sbNewName" placeholder="Nouvelle liste…" onkeydown="if(event.key==='Enter')sbAddList()">
            <select class="sb-parent-select" id="sbParentSel" title="Dans quel groupe ?">
                <option value="">Racine</option>
            </select>
            <button class="sb-add-btn" onclick="sbAddList()">+ Liste</button>
        </div>
        <!-- Add group/folder -->
        <div class="sb-add-row">
            <input class="sb-input" id="sbFolderName" placeholder="Nouveau groupe…" onkeydown="if(event.key==='Enter')sbAddFolder()">
            <button class="sb-add-btn" onclick="sbAddFolder()">+ Groupe</button>
        </div>
    </div>
</div>

<div class="container">

    <div class="header">
        <h1>Mon <em>Dico</em></h1>
        <div class="header-actions">
            <button class="header-btn" onclick="openSidebar()">☰ Listes</button>
            <button class="header-btn" onclick="openFlashcards()">Flashcards</button>
            <button class="header-btn" onclick="openStats()">📊</button>
            <button onclick="toggleTheme()" id="themeBtn" style="background:none;border:none;font-size:20px;cursor:pointer">🌙</button>
        </div>
    </div>

    <!-- Active filter breadcrumb -->
    <div class="active-filter" id="activeFilterBar">
        <span>📂</span>
        <span class="active-filter-name" id="activeFilterName"></span>
        <button class="active-filter-reset" onclick="setActiveList(null)">× Tout afficher</button>
    </div>

    <div class="search-box">
        <input type="text" id="wordInput" placeholder="Rechercher un mot..." onkeydown="if(event.key==='Enter')handleAdd()">
        <button id="pasteBtn" onclick="pasteAndAdd()" title="Coller et ajouter" style="background:var(--card);border:1px solid var(--border);padding:8px 11px;border-radius:8px;cursor:pointer;font-size:15px;color:var(--muted);transition:all .15s" onmouseenter="this.style.borderColor='var(--accent)'" onmouseleave="this.style.borderColor='var(--border)'">📋</button>
        <button id="addBtn" onclick="handleAdd()">Ajouter</button>
    </div>

    <div class="toolbar">
        <button class="io-btn" onclick="exportJSON()">↓ Exporter JSON</button>
        <button class="io-btn imp" onclick="document.getElementById('importFile').click()">↑ Importer JSON</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">

    <!-- Search + sort -->
    <div class="filter-row">
        <input class="filter-search" id="searchInput" placeholder="Rechercher…" oninput="render()">
        <button class="sort-btn" id="sortAlpha" onclick="setSort('alpha')">A–Z</button>
        <button class="sort-btn" id="sortDate"  onclick="setSort('date')">Date</button>
    </div>

    <div id="wordsList"></div>
</div>

<!-- Stats panel -->
<div class="stats-overlay" id="statsOverlay" onclick="e=>e.target===this&&closeStats()">
    <div class="stats-panel">
        <div class="stats-head">
            <span class="stats-title">Statistiques</span>
            <button class="stats-close" onclick="closeStats()">×</button>
        </div>
        <div id="statsContent"></div>
    </div>
</div>

<!-- Flashcards -->
<div class="flashcard-overlay" id="flashOverlay">
    <div class="flashcard-box">
        <div class="fc-wrap">
            <div class="fc-prog" id="fcProg"></div>
            <div class="fc-scene" onclick="flipCard()">
                <div class="fc-card" id="fcCard">
                    <div class="fc-face fc-front">
                        <div class="fc-hint">Appuyez pour révéler</div>
                        <div class="fc-word-front" id="fcWord"></div>
                    </div>
                    <div class="fc-face fc-back">
                        <div class="fc-trad" id="fcTrad"></div>
                        <button class="btn-audio" id="fcAudio" onclick="speakCurrent()" title="Écouter">🔊</button>
                        <div class="fc-def-sm" id="fcDef"></div>
                    </div>
                </div>
            </div>
            <div class="fc-nav">
                <button class="nav-btn" id="fcPrev" onclick="fcGo(-1)">←</button>
                <button class="flip-btn" id="flipBtnEl" onclick="flipCard()">Révéler</button>
                <button class="nav-btn" id="fcNext" onclick="fcGo(1)">→</button>
            </div>
            <div class="fc-dots" id="fcDots"></div>
        </div>
        <button class="fc-close" onclick="closeFlash()">✕ Fermer</button>
    </div>
</div>

<script>
    /* ═══════════════════════════════════════
       DATA
    ═══════════════════════════════════════ */
    let words = JSON.parse(localStorage.getItem('dico_data')  || '[]');
    // nodes: [{id, name, isFolder, parentId, _open?}]
    let nodes = JSON.parse(localStorage.getItem('dico_nodes') || '[]');

    let openWord     = null;
    let activeListId = null;  // null = all
    let sortMode     = 'date'; // 'date' | 'alpha'

    function saveWords(){ localStorage.setItem('dico_data',  JSON.stringify(words)); }
    function saveNodes(){ localStorage.setItem('dico_nodes', JSON.stringify(nodes)); }
    function uid(){ return Date.now() + Math.floor(Math.random()*9999); }
    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    /* ═══════════════════════════════════════
       SIDEBAR
    ═══════════════════════════════════════ */
    function openSidebar(){
        renderTree();
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('sbOverlay').classList.add('open');
    }
    function closeSidebar(){
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sbOverlay').classList.remove('open');
    }

    function renderTree(){
        const folders   = nodes.filter(n => n.isFolder);
        const rootLists = nodes.filter(n => !n.isFolder && !n.parentId);

        let html = '';

        const totalCount = words.length;
        html += `<div class="tree-all${activeListId===null?' active':''}" onclick="setActiveList(null);closeSidebar()">
        📋 Tout
        <span class="tree-count" style="margin-left:auto">${totalCount}</span>
    </div>`;

        if(rootLists.length || folders.length) html += '<div class="tree-divider"></div>';

        rootLists.forEach(l => {
            const count = words.filter(w=>w.listId===l.id).length;
            html += `<div class="tree-item${activeListId===l.id?' active':''}" id="ti_${l.id}" onclick="setActiveList(${l.id});closeSidebar()">
            <span>📄</span>
            <span class="tree-item-lbl" id="lbl_${l.id}">${esc(l.name)}</span>
            <span class="tree-count">${count}</span>
            <button class="tree-edit" onclick="event.stopPropagation();startRename(${l.id})" title="Renommer">✏</button>
            <button class="tree-del"  onclick="event.stopPropagation();deleteNode(${l.id})"  title="Supprimer">×</button>
        </div>`;
        });

        folders.forEach(f => {
            const children = nodes.filter(n => !n.isFolder && n.parentId === f.id);
            const folderCount = words.filter(w => children.some(c=>c.id===w.listId)).length;
            const isOpen = f._open !== false;
            html += `<div class="tree-folder${isOpen?' open':''}" id="tf_${f.id}">
            <div class="tree-folder-head" onclick="toggleFolder(${f.id})">
                <span class="tree-caret">▶</span>
                <span class="tree-folder-lbl" id="lbl_${f.id}">📁 ${esc(f.name)}</span>
                <span class="tree-count">${folderCount}</span>
                <button class="tree-edit" onclick="event.stopPropagation();startRename(${f.id})" title="Renommer">✏</button>
                <button class="tree-del"  onclick="event.stopPropagation();deleteNode(${f.id})"  title="Supprimer groupe">×</button>
            </div>
            <div class="tree-children">
                ${children.map(l => {
                const count = words.filter(w=>w.listId===l.id).length;
                return `<div class="tree-item${activeListId===l.id?' active':''}" id="ti_${l.id}" onclick="setActiveList(${l.id});closeSidebar()">
                        <span>📄</span>
                        <span class="tree-item-lbl" id="lbl_${l.id}">${esc(l.name)}</span>
                        <span class="tree-count">${count}</span>
                        <button class="tree-edit" onclick="event.stopPropagation();startRename(${l.id})" title="Renommer">✏</button>
                        <button class="tree-del"  onclick="event.stopPropagation();deleteNode(${l.id})"  title="Supprimer">×</button>
                    </div>`;
            }).join('')}
            </div>
        </div>`;
        });

        document.getElementById('sbTree').innerHTML = html;

        const sel = document.getElementById('sbParentSel');
        sel.innerHTML = '<option value="">Racine</option>' +
                folders.map(f=>`<option value="${f.id}">${esc(f.name)}</option>`).join('');
    }

    function toggleFolder(fId){
        const f = nodes.find(n=>n.id===fId);
        if(f) f._open = f._open === false;
        saveNodes(); renderTree();
    }

    function startRename(id){
        const node = nodes.find(n=>n.id===id); if(!node) return;
        const lbl  = document.getElementById('lbl_'+id); if(!lbl) return;
        const isFolder = node.isFolder;
        const prev = node.name;
        // Replace label with inline input
        lbl.outerHTML = `<input class="tree-rename-input" id="rin_${id}"
        value="${esc(prev)}"
        onkeydown="if(event.key==='Enter'){event.preventDefault();confirmRename(${id})}if(event.key==='Escape')renderTree()"
        onblur="confirmRename(${id})">`;
        const inp = document.getElementById('rin_'+id);
        if(inp){ inp.focus(); inp.select(); }
    }

    function confirmRename(id){
        const inp  = document.getElementById('rin_'+id); if(!inp) return;
        const name = inp.value.trim();
        if(name){
            const node = nodes.find(n=>n.id===id);
            if(node){
                node.name = name;
                saveNodes();
                // Update breadcrumb if this is the active list
                if(activeListId===id) document.getElementById('activeFilterName').textContent = name;
            }
        }
        renderTree(); render();
    }

    function sbAddList(){
        const name = document.getElementById('sbNewName').value.trim(); if(!name) return;
        const pv   = document.getElementById('sbParentSel').value;
        const parentId = pv ? parseInt(pv) : null;
        nodes.push({ id: uid(), name, isFolder: false, parentId });
        saveNodes();
        document.getElementById('sbNewName').value = '';
        renderTree();
    }

    function sbAddFolder(){
        const name = document.getElementById('sbFolderName').value.trim(); if(!name) return;
        nodes.push({ id: uid(), name, isFolder: true, parentId: null, _open: true });
        saveNodes();
        document.getElementById('sbFolderName').value = '';
        renderTree();
    }

    function deleteNode(id){
        const node = nodes.find(n=>n.id===id); if(!node) return;
        if(node.isFolder){
            const childIds = nodes.filter(n=>n.parentId===id).map(n=>n.id);
            words.forEach(w=>{ if(childIds.includes(w.listId)) w.listId=null; });
            nodes = nodes.filter(n=>n.id!==id && n.parentId!==id);
        } else {
            words.forEach(w=>{ if(w.listId===id) w.listId=null; });
            nodes = nodes.filter(n=>n.id!==id);
        }
        if(activeListId===id) setActiveList(null);
        saveNodes(); saveWords();
        renderTree(); render();
    }

    function setActiveList(id){
        activeListId = id;
        fcIdx=0; fcFlipped=false; fcSeen=new Set();
        // Breadcrumb
        const bar  = document.getElementById('activeFilterBar');
        const name = document.getElementById('activeFilterName');
        if(id===null){ bar.classList.remove('show'); }
        else {
            const node = nodes.find(n=>n.id===id);
            name.textContent = node ? node.name : '';
            bar.classList.add('show');
        }
        render();
    }

    function getPool(){
        const q = (document.getElementById('searchInput')?.value||'').trim().toLowerCase();
        let pool = activeListId !== null ? words.filter(w=>w.listId===activeListId) : [...words];
        if(q) pool = pool.filter(w => w.term.toLowerCase().includes(q) || (w.translation||'').toLowerCase().includes(q));
        if(sortMode==='alpha') pool.sort((a,b)=>a.term.localeCompare(b.term));
        // 'date' = insertion order (already newest-first)
        return pool;
    }

    function setSort(mode){
        sortMode = mode;
        document.getElementById('sortAlpha').classList.toggle('on', mode==='alpha');
        document.getElementById('sortDate').classList.toggle('on',  mode==='date');
        render();
    }

    /* ═══════════════════════════════════════
       ADD WORD
    ═══════════════════════════════════════ */
    async function pasteAndAdd(){
        const btn = document.getElementById('pasteBtn');
        let term = '';

        // Try modern clipboard API first
        if(navigator?.clipboard?.readText){
            try{
                const text = await navigator.clipboard.readText();
                term = text.trim().split(/\s+/)[0].toLowerCase().replace(/[^a-zA-Z'-]/g,'');
            }catch(e){ /* permission denied */ }
        }

        // Fallback: use a hidden textarea + execCommand
        if(!term){
            const ta = document.createElement('textarea');
            ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
            document.body.appendChild(ta);
            ta.focus();
            try{
                document.execCommand('paste');
                term = ta.value.trim().split(/\s+/)[0].toLowerCase().replace(/[^a-zA-Z'-]/g,'');
            }catch(e){}
            document.body.removeChild(ta);
        }

        if(!term){ btn.textContent='?'; setTimeout(()=>btn.textContent='📋',1200); return; }

        document.getElementById('wordInput').value = term;
        await handleAdd();
    }

    async function handleAdd(){
        const input = document.getElementById('wordInput');
        const term  = input.value.trim().toLowerCase();
        if(!term || words.some(w=>w.term===term)) return;

        const btn = document.getElementById('addBtn');
        btn.textContent = '...';

        try{
            const tradRes = await fetch(
                    `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=fr&dt=t&q=${encodeURIComponent(term)}`
            );
            const tradData  = await tradRes.json();
            const translation = tradData[0][0][0];

            const dictRes  = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${term}`);
            const dictData = await dictRes.json();

            words.unshift({
                id: uid(), term, translation,
                details: Array.isArray(dictData) ? dictData[0] : null,
                listId: activeListId   // auto-assign to current list if any
            });
            saveWords(); input.value=''; render();
        }catch(e){
            console.error(e);
            alert('Erreur lors de la récupération');
        }finally{
            btn.textContent = 'Ajouter';
        }
    }

    /* ═══════════════════════════════════════
       RENDER
    ═══════════════════════════════════════ */
    function render(){
        const pool = getPool();
        const listOpts = nodes.filter(n=>!n.isFolder)
                .map(n=>`<option value="${n.id}">${esc(n.name)}</option>`).join('');

        document.getElementById('wordsList').innerHTML = pool.map(w => {
            const listNode = w.listId ? nodes.find(n=>n.id===w.listId) : null;
            const badge    = listNode ? `<span class="word-list-badge">${esc(listNode.name)}</span>` : '';
            return `<div class="word-card">
<div class="word-header" onclick="toggleWord(${w.id})">
  <span class="word-title">${esc(w.term)}${badge}</span>
  <span style="display:flex;align-items:center;gap:6px">
    <button class="btn-audio" onclick="event.stopPropagation();speak('${esc(w.term)}')" title="Écouter">🔊</button>
    <span>${openWord===w.id?'▲':'▼'}</span>
  </span>
</div>
${openWord===w.id ? `<div class="word-content">
  <span class="translation">${esc(w.translation)}</span>
  ${w.details ? renderDetails(w.details) : '<p>Aucun détail trouvé.</p>'}
  <div class="word-list-row">
    <span class="word-list-row-lbl">Liste</span>
    <select class="word-list-select" id="wls_${w.id}" onchange="assignList(${w.id},this.value)">
      <option value="">— aucune —</option>${listOpts}
    </select>
  </div>
  <button class="btn-del" onclick="deleteWord(${w.id})">Supprimer</button>
</div>` : ''}
</div>`;
        }).join('');

        // Set select current value
        pool.forEach(w => {
            if(openWord===w.id){
                const sel = document.getElementById(`wls_${w.id}`);
                if(sel && w.listId) sel.value = w.listId;
            }
        });
    }

    function renderDetails(data){
        return data.meanings.map(m=>`
<div class="pos-block">
<span class="pos-title">${esc(m.partOfSpeech)}</span>
${m.definitions.slice(0,3).map((d,i)=>`
<div class="definition-item">
<div class="def-text"><span class="def-num">${i+1}.</span><span>${esc(d.definition)}</span></div>
${d.example?`<span class="example">"${esc(d.example)}"</span>`:''}
</div>`).join('')}
</div>`).join('');
    }

    function toggleWord(id){ openWord = openWord===id ? null : id; render(); }

    function assignList(wordId, val){
        const w = words.find(x=>x.id===wordId); if(!w) return;
        w.listId = val ? parseInt(val) : null;
        saveWords(); render();
        if(document.getElementById('sidebar').classList.contains('open')) renderTree();
    }

    function deleteWord(id){
        words = words.filter(w=>w.id!==id);
        saveWords(); render();
    }

    /* ═══════════════════════════════════════
       THEME
    ═══════════════════════════════════════ */
    function toggleTheme(){
        const isDark = document.body.classList.toggle('dark');
        document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
        document.getElementById('themeColor').content   = isDark ? '#0f0e0c' : '#f7f4ef';
    }

    /* ═══════════════════════════════════════
       EXPORT / IMPORT
    ═══════════════════════════════════════ */
    function exportJSON(){
        const payload = { version: 2, words, nodes };
        const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url; a.download = `mon-dico-${new Date().toISOString().slice(0,10)}.json`;
        a.click(); URL.revokeObjectURL(url);
    }
    function importJSON(e){
        const file = e.target.files?.[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            try{
                const parsed = JSON.parse(ev.target.result);

                // Support ancien format (tableau de mots) et nouveau format (objet v2)
                let inWords, inNodes;
                if(Array.isArray(parsed)){
                    inWords = parsed; inNodes = [];
                } else if(parsed.version===2 && Array.isArray(parsed.words)){
                    inWords = parsed.words; inNodes = parsed.nodes || [];
                } else { throw new Error(); }

                // Merge mots (pas de doublon)
                const exWords = new Set(words.map(w=>w.term.toLowerCase()));
                const newWords = inWords.filter(w=>w.term && !exWords.has(w.term.toLowerCase()));

                // Merge nodes : on réassigne des nouveaux IDs aux noeuds importés
                // pour éviter les collisions, et on remet à jour les listId des mots importés
                const idMap = {};  // oldId -> newId
                const newNodes = inNodes.map(n => {
                    const newId = uid();
                    idMap[n.id] = newId;
                    return { ...n, id: newId, parentId: n.parentId ?? null };
                });
                // Fix parentId references
                newNodes.forEach(n => {
                    if(n.parentId && idMap[n.parentId]) n.parentId = idMap[n.parentId];
                });
                // Fix listId references in imported words
                newWords.forEach(w => {
                    if(w.listId && idMap[w.listId]) w.listId = idMap[w.listId];
                    else if(w.listId && !idMap[w.listId]) w.listId = null; // liste inconnue
                });

                // Fusionner les noeuds en évitant les doublons de nom au même niveau
                const exNodeKeys = new Set(nodes.map(n=>`${n.parentId||''}|${n.name.toLowerCase()}`));
                const filteredNodes = newNodes.filter(n => !exNodeKeys.has(`${n.parentId||''}|${n.name.toLowerCase()}`));

                words = [...newWords, ...words];
                nodes = [...nodes, ...filteredNodes];
                saveWords(); saveNodes(); render();
                alert(`${newWords.length} mot${newWords.length!==1?'s':''} et ${filteredNodes.length} liste${filteredNodes.length!==1?'s':''} importé${newWords.length!==1?'s':''} ✓`);
            }catch(err){ console.error(err); alert('Fichier invalide ✗'); }
        };
        reader.readAsText(file); e.target.value='';
    }

    /* ═══════════════════════════════════════
       FLASHCARDS
    ═══════════════════════════════════════ */
    let fcIdx=0, fcFlipped=false, fcSeen=new Set();

    function openFlashcards(){
        const pool = getPool();
        if(!pool.length){ alert('Aucun mot dans cette sélection'); return; }
        fcIdx=0; fcFlipped=false; fcSeen=new Set();
        renderCards();
        document.getElementById('flashOverlay').style.display='flex';
    }
    function closeFlash(){ document.getElementById('flashOverlay').style.display='none'; }

    function renderCards(){
        const pool = getPool(); if(!pool.length) return;
        fcIdx = Math.min(fcIdx, pool.length-1);
        const c = pool[fcIdx];
        const listLabel = activeListId ? (nodes.find(n=>n.id===activeListId)?.name||'') : '';
        document.getElementById('fcProg').innerHTML =
                `<em>${fcIdx+1}</em> / ${pool.length}${listLabel?` · ${esc(listLabel)}`:''}${fcSeen.size>0?` · ${fcSeen.size} vu${fcSeen.size>1?'s':''}` : ''}`;
        document.getElementById('fcWord').textContent = c.term;
        document.getElementById('fcTrad').textContent = c.translation;
        const shortDef = c.details?.meanings?.[0]?.definitions?.[0]?.definition || '';
        document.getElementById('fcDef').textContent  = shortDef ? shortDef.slice(0,80)+(shortDef.length>80?'…':'') : '';
        document.getElementById('fcCard').classList.toggle('flipped', fcFlipped);
        document.getElementById('flipBtnEl').textContent = fcFlipped ? 'Masquer' : 'Révéler';
        document.getElementById('fcPrev').disabled = fcIdx===0;
        document.getElementById('fcNext').disabled = fcIdx===pool.length-1;
        if(pool.length<=40){
            document.getElementById('fcDots').innerHTML = pool.map((_,i)=>
                    `<div class="dot${i===fcIdx?' cur':fcSeen.has(i)?' seen':''}" onclick="fcJump(${i})"></div>`
            ).join('');
        }
    }

    function flipCard(){ fcFlipped=!fcFlipped; fcSeen.add(fcIdx); renderCards(); }
    function fcGo(d){
        const pool=getPool(); const n=fcIdx+d;
        if(n<0||n>=pool.length) return;
        fcSeen.add(fcIdx); fcIdx=n; fcFlipped=false; renderCards();
    }
    function fcJump(i){ fcSeen.add(fcIdx); fcIdx=i; fcFlipped=false; renderCards(); }

    /* ═══════════════════════════════════════
       AUDIO — Web Speech API
    ═══════════════════════════════════════ */
    function speak(term){
        if(!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(term);
        utt.lang = 'en-US'; utt.rate = 0.9;
        // Try to get an English voice
        const voices = window.speechSynthesis.getVoices();
        const enVoice = voices.find(v=>v.lang.startsWith('en'));
        if(enVoice) utt.voice = enVoice;
        window.speechSynthesis.speak(utt);
    }
    function speakCurrent(){
        const pool = getPool();
        if(pool[fcIdx]) speak(pool[fcIdx].term);
    }

    /* ═══════════════════════════════════════
       STATS
    ═══════════════════════════════════════ */
    function openStats(){
        renderStats();
        document.getElementById('statsOverlay').classList.add('open');
    }
    function closeStats(){
        document.getElementById('statsOverlay').classList.remove('open');
    }

    function renderStats(){
        const total = words.length;
        const lists = nodes.filter(n=>!n.isFolder);
        const unassigned = words.filter(w=>!w.listId).length;

        // Words added per day for the last 7 days
        const days = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
        const now = new Date(); now.setHours(0,0,0,0);
        const weekCounts = Array(7).fill(0);
        words.forEach(w => {
            const d = new Date(w.id); // id = timestamp
            d.setHours(0,0,0,0);
            const diff = Math.round((now - d) / 86400000);
            if(diff >= 0 && diff < 7) weekCounts[6 - diff]++;
        });
        const maxWeek = Math.max(...weekCounts, 1);
        const todayIdx = 6;

        // Build week bars
        const weekLabels = Array.from({length:7}, (_,i) => {
            const d = new Date(now); d.setDate(d.getDate() - (6-i));
            return days[d.getDay()];
        });
        const weekHTML = weekCounts.map((c,i) => {
            const h = Math.max(4, Math.round((c/maxWeek)*54));
            return `<div class="week-bar-wrap">
            <div class="week-bar${i===todayIdx?' today':''}" style="height:${h}px" title="${c} mot${c!==1?'s':''}"></div>
            <div class="week-lbl">${weekLabels[i]}</div>
        </div>`;
        }).join('');

        // Per-list breakdown
        const listRows = lists.map(l => {
            const c = words.filter(w=>w.listId===l.id).length;
            const pct = total ? Math.round(c/total*100) : 0;
            return `<div class="stats-list-row">
            <span class="stats-list-name">📄 ${esc(l.name)}</span>
            <div class="stats-bar-wrap"><div class="stats-bar" style="width:${pct}%"></div></div>
            <span class="stats-list-count">${c}</span>
        </div>`;
        }).join('');

        const thisWeek = weekCounts.reduce((a,b)=>a+b,0);
        const addedToday = weekCounts[6];

        document.getElementById('statsContent').innerHTML = `
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-lbl">Mots au total</div></div>
            <div class="stat-card"><div class="stat-val">${lists.length}</div><div class="stat-lbl">Listes</div></div>
            <div class="stat-card"><div class="stat-val">${addedToday}</div><div class="stat-lbl">Ajoutés aujourd'hui</div></div>
            <div class="stat-card"><div class="stat-val">${thisWeek}</div><div class="stat-lbl">Cette semaine</div></div>
        </div>
        <div class="stats-section-title">Activité — 7 derniers jours</div>
        <div class="stats-week">${weekHTML}</div>
        ${lists.length ? `<div class="stats-section-title">Par liste</div>${listRows}` : ''}
        ${unassigned ? `<div class="stats-list-row">
            <span class="stats-list-name" style="color:var(--muted)">Sans liste</span>
            <div class="stats-bar-wrap"><div class="stats-bar" style="width:${Math.round(unassigned/total*100)}%;opacity:.4"></div></div>
            <span class="stats-list-count" style="opacity:.5">${unassigned}</span>
        </div>` : ''}`;
    }

    /* ─── Init ─── */
    render();
    document.getElementById('sortDate').classList.add('on');

    // ── Share Target : handle ?shared_text=... from OS share sheet ──
    (function handleShareTarget(){
        const params = new URLSearchParams(window.location.search);
        const shared = (params.get('shared_text') || params.get('shared_title') || '').trim();
        if(!shared) return;
        // Clean URL so reload doesn't re-trigger
        history.replaceState({}, '', window.location.pathname);
        // Extract first word (might be a full sentence or URL)
        const word = shared.split(/\s+/)[0].toLowerCase().replace(/[^a-zA-Z'-]/g, '');
        if(!word) return;
        // Pre-fill input and trigger add after a short delay (let page render first)
        document.getElementById('wordInput').value = word;
        setTimeout(handleAdd, 300);
    })();
</script>
